sep: 2106
spec_url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#security-implications
requirements:
  - check: sep-2106-no-network-ref-deref
    text: 'Implementations MUST NOT automatically dereference `$ref` values that resolve to a network URI (i.e. anything that is not a same-document JSON Pointer such as `#/$defs/Foo` or an internal `$anchor`); an opt-in mode that fetches non-local `$ref`s MUST be disabled by default / Schemas that fail to validate due to an unresolved external `$ref` SHOULD be rejected rather than silently treated as permissive'

  # Client-side keyword-preservation checks (Issue #101). The MUST is
  # implicit in SEP-2106 §1 "Loosen inputSchema", which redefines
  # `inputSchema` to permit any additional JSON Schema 2020-12 keyword.
  # A client that silently strips such a keyword while parsing a server's
  # tool definition violates that contract, since downstream consumers can
  # no longer recover the intended semantics from what the client exposes.
  - check: json-schema-2020-12-client-$schema-preserved
    text: 'The `inputSchema` field is typed as `{ $schema?: string; type: "object"; [key: string]: unknown }`; the optional `$schema` field declares the JSON Schema dialect under which the rest of the schema is interpreted. Implementations MUST preserve `$schema` when parsing a tool definition received from a server, since dropping it loses the dialect declaration.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema
  - check: json-schema-2020-12-client-$defs-preserved
    text: 'The `inputSchema` field "now accepts any additional JSON Schema properties", which includes `$defs` (the JSON Schema 2020-12 reusable-subschema keyword). Implementations MUST preserve `$defs` when parsing a tool definition received from a server.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema
  - check: json-schema-2020-12-client-additionalProperties-preserved
    text: 'The `inputSchema` field "now accepts any additional JSON Schema properties", which includes `additionalProperties`. Implementations MUST preserve `additionalProperties` when parsing a tool definition received from a server, since dropping it changes whether unknown arguments are accepted.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema
  - check: sep-2106-client-composition-keywords-preserved
    text: 'The `inputSchema` field "now accepts any additional JSON Schema properties. This enables: Composition keywords: anyOf, oneOf, allOf, not". Implementations MUST preserve these composition keywords when parsing a tool definition received from a server.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema
  - check: sep-2106-client-conditional-keywords-preserved
    text: 'The `inputSchema` field "now accepts any additional JSON Schema properties. This enables: ... Conditional schemas: if/then/else". Implementations MUST preserve these conditional keywords when parsing a tool definition received from a server.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema
  - check: sep-2106-client-anchor-keyword-preserved
    text: 'The `inputSchema` field "now accepts any additional JSON Schema properties. This enables: ... Reference schemas: $ref, $defs". Implementations MUST preserve `$anchor` (a JSON Schema 2020-12 reference-anchor keyword that lives inside `$defs`) when parsing a tool definition received from a server.'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#1-loosen-inputschema

  - text: "SDK maintainers SHOULD: Document the migration in SDK release notes; Where ergonomic, provide typed helpers (e.g. generics over a tool's `outputSchema`) so consumers do not need to write narrowing guards by hand"
    excluded: 'Migration/deprecation guidance for SDK maintainers; about SDK source code, not protocol-observable wire behavior'
    url: https://modelcontextprotocol.io/seps/2106-json-schema-2020-12#backward-compatibility
  - text: 'JSON Schema validation already handles type checking, value constraints, and required field validation, and implementations MUST continue to validate all inputs and outputs against declared schemas'
    excluded: 'Restates pre-existing schema-validation behavior and is too broad to attribute to a specific observable SEP-2106 check; input/output validation overlaps existing tool scenarios'
  - text: 'An opt-in mode that fetches non-local `$ref`s SHOULD enforce an allowlist of hosts (or at minimum reject loopback, link-local, and private network addresses), apply timeouts and size limits, and log dereferenced URIs'
    excluded: 'Applies only when the non-default opt-in network-$ref fetch mode is enabled; not observable in default conformance runs'
  - text: 'Implementations SHOULD apply reasonable bounds — for example, a maximum schema depth, a cap on the total number of subschemas, or a per-validation time budget — to prevent a malicious tool definition from acting as a CPU DoS vector against the validator'
    excluded: 'Internal validator resource limits (max schema depth, subschema cap, per-validation time budget); a defensive measure not observable on the wire'
